# Server
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:reliefnetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=ReliefNet2024SecretKeyForJWTTokenGenerationMustBe256BitsLong
jwt.expiration=86400000

# Logging
logging.level.com.reliefnet=INFO
logging.level.org.springframework.security=WARN

# Disable open-in-view warning
spring.jpa.open-in-view=false
